<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyUp — Andel Content Onboarding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #3DCC85;
    --accent-1: #17734C;
    --accent-2: #C9FF5C;
    --dark: #002415;
    --card: #085233;
    --border: rgba(241,255,225,0.10);
    --gray: #B7BFBC;
    --white: #F1FFE1;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    padding: 32px 24px 0;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 20px;
  }
  .logo-ru {
    width: 48px; height: 48px;
    background: linear-gradient(180deg, var(--primary), var(--accent-1));
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .logo-ru svg { width: 26px; height: 26px; }
  .logo-x {
    font-size: 16px; color: rgba(241,255,225,0.30); font-weight: 500;
  }
  .logo-brand {
    height: 48px; width: 48px;
    background: white;
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px;
  }
  .logo-brand img { height: 100%; width: auto; display: block; }
  .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .header p { color: var(--gray); font-size: 15px; max-width: 480px; margin: 0 auto 8px; }
  .time-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(201,255,92,0.10); border: 1px solid rgba(201,255,92,0.30);
    color: var(--accent-2); font-size: 13px; font-weight: 600;
    padding: 6px 16px; border-radius: 50px; margin-top: 12px;
  }

  .progress-wrap { max-width: 640px; margin: 28px auto 0; padding: 0 24px; }
  .progress-bar {
    height: 4px; background: rgba(241,255,225,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent-2));
    border-radius: 4px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--gray); font-weight: 500;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 24px 24px 120px; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--primary); margin-bottom: 8px;
  }
  .block-label {
    display: inline-block;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--accent-2);
    background: rgba(201,255,92,0.08);
    border: 1px solid rgba(201,255,92,0.25);
    padding: 4px 10px; border-radius: 50px;
    margin-bottom: 14px;
  }
  .section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .section-desc { font-size: 14px; color: var(--gray); margin-bottom: 28px; }

  .question { margin-bottom: 28px; }
  .q-label {
    font-size: 15px; font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .q-hint { font-size: 13px; color: var(--gray); margin-bottom: 10px; font-style: italic; }

  textarea, input[type="text"], input[type="email"] {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; color: var(--white);
    font-family: inherit; font-size: 15px; resize: vertical;
    transition: border-color 0.2s; outline: none;
  }
  textarea:focus, input[type="text"]:focus, input[type="email"]:focus {
    border-color: rgba(61,204,133,0.55);
  }
  textarea { min-height: 88px; }
  textarea.tall { min-height: 160px; }
  textarea.x-tall { min-height: 260px; }

  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .radio-row:hover { border-color: rgba(61,204,133,0.45); background: rgba(61,204,133,0.06); }
  .radio-row.selected {
    background: rgba(61,204,133,0.12); border-color: var(--primary);
  }
  .radio-row input[type="radio"] {
    margin-top: 4px; accent-color: var(--primary);
  }
  .radio-row .rl { font-size: 14px; font-weight: 500; }

  .inline-text { margin-top: 10px; display: none; }
  .inline-text.show { display: block; }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,36,21,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 640px; margin: 0 auto;
    z-index: 100;
  }
  @media(min-width:641px) {
    .nav-bar { left: 50%; transform: translateX(-50%); border-radius: 20px 20px 0 0; }
  }
  .btn {
    padding: 12px 28px; border-radius: 12px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-ghost { background: transparent; color: var(--gray); }
  .btn-ghost:hover { color: var(--white); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--accent-1));
    color: var(--dark);
  }
  .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-submit {
    background: linear-gradient(135deg, var(--accent-2), var(--primary));
    color: var(--dark);
  }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .welcome { text-align: center; padding: 40px 0 0; }
  .welcome h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
  .welcome p { color: var(--gray); font-size: 16px; max-width: 460px; margin: 0 auto 32px; line-height: 1.65; }
  .welcome-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    text-align: left; margin-bottom: 32px;
  }
  .wc {
    padding: 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .wc h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .wc p { font-size: 12px; color: var(--gray); margin: 0; }

  .done { text-align: center; padding: 60px 0; }
  .done .logo-brand {
    height: 72px; width: 72px; margin: 0 auto 20px;
    padding: 8px;
    border-radius: var(--radius);
  }
  .done h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .done p { color: var(--gray); font-size: 16px; max-width: 420px; margin: 0 auto; line-height: 1.6; }

  @media(max-width:480px) {
    .welcome-cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
    .section-title { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-ru">
      <svg viewBox="0 0 24 24" fill="none" stroke="#002415" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
    </div>
    <span class="logo-x">x</span>
    <div class="logo-brand" aria-label="Andel">
      <img src="assets/andel-icon.png" alt="Andel">
    </div>
  </div>
  <h1>Executive Content Onboarding</h1>
  <p>Voice, audience, and the stories the engine can't pull from posts alone.</p>
  <div class="time-badge">Takes about 12 minutes</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="sectionLabel">Welcome</span>
    <span id="progressPct">0%</span>
  </div>
</div>

<div class="container" id="app"></div>

<div class="nav-bar">
  <button class="btn btn-ghost" id="btnBack" onclick="goBack()">Back</button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()">Get Started</button>
</div>

<script>
  // ============================================================
  // Session + Apps Script wiring
  // ============================================================
  var SESSION_ID = (Date.now().toString(36) + Math.random().toString(36).substr(2, 9));
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlsN0yrOI_uVwAyJNnIbz8Vg9nKC8kWxAuVR6Uw49lEj36kzK84SA5AbEfOnDiTtzCnQ/exec';
  var state = {};

  function sendEvent(event, fields) {
    Object.assign(state, fields || {});
    state.event = event;
    state.session_id = SESSION_ID;
    state.timestamp = new Date().toISOString();
    try {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(state),
        redirect: 'follow'
      });
    } catch (e) { /* network noise — swallow */ }
  }

  // ============================================================
  // Sections — 10 questions across 3 blocks
  //   Block A · Voice & Audience       → Q1, Q2
  //   Block B · The Framework + Origin → Q3, Q4
  //   Block C · Filling the Gaps       → Q5–Q10
  // ============================================================
  var sections = [
    // 0: Welcome
    { id: 'welcome', label: 'Welcome', type: 'welcome', render: function () {
      return ''
        + '<div class="welcome">'
        + '  <h2>Hey Jay</h2>'
        + '  <p>Your 40 posts and the GLP-1 Studio podcast already gave us most of your voice. What posts can\'t reach: the one moment per chapter, the framework you\'ve been applying for 20 years and never named, and the founder stories that aren\'t on LinkedIn yet. Answer fast. First draft, no edits.</p>'
        + '  <div class="welcome-cards">'
        + '    <div class="wc"><h4>10 short questions</h4><p>3 blocks: voice, framework, gaps</p></div>'
        + '    <div class="wc"><h4>About 12 minutes</h4><p>Coffee-length</p></div>'
        + '    <div class="wc"><h4>No wrong answers</h4><p>First instinct wins</p></div>'
        + '    <div class="wc"><h4>Stays between us</h4><p>Only your content team sees it</p></div>'
        + '  </div>'
        + '</div>';
    }},

    // ─── BLOCK A · Voice & Audience ───────────────────────────────

    // 1: Q1 — Audience (open)
    { id: 'q1', label: 'Voice & Audience', type: 'question', qNum: 1, qKey: 'q1', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 1 of 10</div>'
        + '<div class="section-title">Who do you want to reach on LinkedIn?</div>'
        + '<div class="section-desc">Not your whole market — the one person you\'re most happy saw a great post of yours.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Describe them in your own words.</div>'
        + '  <div class="q-hint">Name, role, company are perfect. Or: "a head of benefits at a 2,000-person self-insured employer who\'s been quietly Googling alternatives to their PBM." The more specific the better.</div>'
        + '  <textarea class="tall" data-key="q1" placeholder="The person I\'m most happy saw the post is..."></textarea>'
        + '</div>';
    }},

    // 2: Q2 — How do you want them to see YOU? (radio + Other)
    { id: 'q2', label: 'Voice & Audience', type: 'question', qNum: 2, qKey: 'q2', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 2 of 10</div>'
        + '<div class="section-title">How do you want them to see <em>you</em>?</div>'
        + '<div class="section-desc">When a customer or peer describes you to someone else, what\'s the line you want them to use? Pick one or write your own.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Choose the closest framing.</div>'
        + '  <div class="radio-group" data-key="q2">'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The serial founder now taking on pharma"><span class="rl"><strong>The serial founder who\'s now taking on pharma</strong> →3 exits across mobility, insurance, and now medication; the operator who\'s done it before</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The market-structure thinker"><span class="rl"><strong>The market-structure thinker</strong> →the person who finds the architecture problem in every industry he enters</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The operator who builds the platforms"><span class="rl"><strong>The operator who builds the platforms others wish existed</strong> →four times in 20 years; kills the intermediary, builds the direct-relationship platform</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The entrepreneur-from-another-background"><span class="rl"><strong>The entrepreneur-from-another-background, Mark Cuban style</strong> →outsider taking on a regulated incumbent industry from a different angle</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="Other"><span class="rl"><strong>Other</strong> →write your own framing</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Other">'
        + '    <textarea data-key="q2_other" placeholder="How do you want to be seen, in your own words?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // ─── BLOCK B · The Framework + Origin ─────────────────────────

    // 3: Q3 — Name the framework (radio + Other / write-in)
    { id: 'q3', label: 'The Framework', type: 'question', qNum: 3, qKey: 'q3', render: function () {
      return ''
        + '<div class="block-label">Block B · The Framework + Origin</div>'
        + '<div class="section-label">Question 3 of 10</div>'
        + '<div class="section-title">Name the framework.</div>'
        + '<div class="section-desc">You\'ve done this 4 times — eCourier, Hailo, Thimble, Andel. Same structural move: kill the intermediary, build the direct-relationship platform, aggregate demand and supply. Naming it unlocks a 4-company case-study series and a recognizable signature.</div>'
        + '<div class="question">'
        + '  <div class="q-label">What do you call that pattern?</div>'
        + '  <div class="radio-group" data-key="q3">'
        + '    <label class="radio-row"><input type="radio" name="q3" value="Direct Market Architecture"><span class="rl"><strong>Direct Market Architecture</strong> →the platform that lets two sides transact without the middleman</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="Cooperative Architecture"><span class="rl"><strong>Cooperative Architecture</strong> →ties to the Andel "share apart" Scandinavian co-op origin</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="The Intermediary Test"><span class="rl"><strong>The Intermediary Test</strong> →the heuristic for spotting which industry to disintermediate next</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="I have my own name for it"><span class="rl"><strong>I have my own name for it</strong> →write it below</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="Haven\'t named it yet"><span class="rl"><strong>Haven\'t named it yet — let\'s pick one together</strong> →drop candidates in the box</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="I have my own name for it">'
        + '    <textarea data-key="q3_other" placeholder="Your name for it — and a one-line definition if you have one."></textarea>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Haven\'t named it yet">'
        + '    <textarea data-key="q3_other" placeholder="Candidate names — even half-formed ones. We\'ll workshop it from here."></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 4: Q4 — The Andel founding moment (open, tall)
    { id: 'q4', label: 'The Framework', type: 'question', qNum: 4, qKey: 'q4', render: function () {
      return ''
        + '<div class="block-label">Block B · The Framework + Origin</div>'
        + '<div class="section-label">Question 4 of 10</div>'
        + '<div class="section-title">The Andel founding moment.</div>'
        + '<div class="section-desc">The Bernie Sanders drug-pricing hearings scene from the podcast is on record — pharma CEOs, PBM CEOs, "medievally organized," "earned the right to try." Powerful, but a little wide. We want the sharper second moment if there is one.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Is the Sanders hearings scene THE moment, or is there a more specific second one — a conversation, a number you saw, a failure you witnessed — that actually pulled the trigger?</div>'
        + '  <div class="q-hint">Walk us through the scene. Who was there. What was said. What you almost did instead. First-draft is fine.</div>'
        + '  <textarea class="tall" data-key="q4" placeholder="The real moment was..."></textarea>'
        + '</div>';
    }},

    // ─── BLOCK C · Filling the Gaps ───────────────────────────────

    // 5: Q5 — One pre-Andel story you'd be willing to tell (open, tall)
    { id: 'q5', label: 'Filling the Gaps', type: 'question', qNum: 5, qKey: 'q5', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 5 of 10</div>'
        + '<div class="section-title">One pre-Andel story you\'d be willing to tell on LinkedIn.</div>'
        + '<div class="section-desc">Your career arc — eCourier, Hailo, Thimble — is the strongest trust signal you have. None of it shows up in your 2026 posts. Pick one and give us the scene; we won\'t publish without your sign-off.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Pick one and tell the story.</div>'
        + '  <div class="q-hint">Candidates: (a) Hailo founded with the three London black cab drivers, (b) eCourier surviving the 2008 financial crisis, (c) the Thimble exit to Arch and what the two-year integration taught you, or (d) something else entirely. Who, where, what was said, what shifted.</div>'
        + '  <textarea class="tall" data-key="q5" placeholder="The story I\'d be willing to tell is..."></textarea>'
        + '</div>';
    }},

    // 6: Q6 — AI in Andel Series (radio + Other)
    { id: 'q6', label: 'Filling the Gaps', type: 'question', qNum: 6, qKey: 'q6', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 6 of 10</div>'
        + '<div class="section-title">The "AI in Andel Series" — continue or retire?</div>'
        + '<div class="section-desc">You posted Series #1 on March 31 ("The Death of the User Interface in the Enterprise") and explicitly promised more. Seven weeks later, no Series #2. Promised series that don\'t continue cost credibility. Three options:</div>'
        + '<div class="question">'
        + '  <div class="q-label">Pick one.</div>'
        + '  <div class="radio-group" data-key="q6">'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Continue"><span class="rl"><strong>Continue</strong> →here are 2-3 topics I\'d want to cover next (write below)</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Retire"><span class="rl"><strong>Retire the framing</strong> →the original post stands; no Series #2</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Replace"><span class="rl"><strong>Replace with a different recurring series</strong> →write the new framing below</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Continue">'
        + '    <textarea data-key="q6_other" placeholder="2-3 topics for Series #2, #3, #4. Half-baked is fine."></textarea>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Replace">'
        + '    <textarea data-key="q6_other" placeholder="What would the new recurring series be? Name + 2-3 candidate topics."></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 7: Q7 — Ritu Malhotra coordination (radio + Other)
    { id: 'q7', label: 'Filling the Gaps', type: 'question', qNum: 7, qKey: 'q7', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 7 of 10</div>'
        + '<div class="section-title">Ritu Malhotra — where does she stand?</div>'
        + '<div class="section-desc">Ritu shows up as co-founder in your funding press but is invisible in your 2026 LinkedIn corpus. The pattern-founder + pharmacy-domain partnership is a structurally stronger story than a solo-founder narrative — if she\'s open to it.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Which describes her current involvement?</div>'
        + '  <div class="radio-group" data-key="q7">'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Active co-founder"><span class="rl"><strong>Active co-founder</strong> →keep her on the org chart and we should onboard her as the second Andel voice</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Advisor / part-time"><span class="rl"><strong>Advisor / part-time</strong> →we should still onboard her for the context graph, even if she doesn\'t post much</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Moved on"><span class="rl"><strong>She\'s moved on</strong> →keep her out of Andel content going forward</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Other"><span class="rl"><strong>Other</strong> →describe below</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Other">'
        + '    <textarea data-key="q7_other" placeholder="What\'s her real role today, and is she up for any LinkedIn coordination?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 8: Q8 — A named customer story (open)
    { id: 'q8', label: 'Filling the Gaps', type: 'question', qNum: 8, qKey: 'q8', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 8 of 10</div>'
        + '<div class="section-title">A customer story that sticks with you.</div>'
        + '<div class="section-desc">You have the aggregate numbers (the $30K-vs-$200 alcoholism inpatient math, the employer-coverage-removal study). What the corpus is missing: one real employer behind one number.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Most memorable employer conversation about GLP-1 costs. What did they say that stuck?</div>'
        + '  <div class="q-hint">Customer can stay anonymous — we keep them un-named until you clear it. The line they said, the room you were in, what shifted afterward. Even an "I never told anyone this" beat lands.</div>'
        + '  <textarea data-key="q8" placeholder="The one I keep coming back to is..."></textarea>'
        + '</div>';
    }},

    // 9: Q9 — Who you learn from (open)
    { id: 'q9', label: 'Filling the Gaps', type: 'question', qNum: 9, qKey: 'q9', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 9 of 10</div>'
        + '<div class="section-title">Who you learn from.</div>'
        + '<div class="section-desc">Your posts reference journalists you trust (Naomi Kresge, Madison Muller, Stephen Appezzato) but no thinkers / framework-builders. That gap shapes both what you write next and who you could be in conversation with.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Who in employer benefits, pharmacy, or pharma commercialization is writing or saying things you wish more people were reading?</div>'
        + '  <div class="q-hint">LinkedIn URLs are perfect. Substack writers, podcast hosts, operators too. "Learn from," not just "respect."</div>'
        + '  <textarea data-key="q9" placeholder="The ones I actually learn from..."></textarea>'
        + '</div>';
    }},

    // 10: Q10 — Career-timeline color details (long open, structured)
    { id: 'q10', label: 'Filling the Gaps', type: 'question', qNum: 10, qKey: 'q10', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 10 of 10</div>'
        + '<div class="section-title">Career-timeline color details.</div>'
        + '<div class="section-desc">We want to write a year-by-year career post in your voice (think: "1987: Founded a MedTech startup (failed). 1994: Built one of the early ISPs. Met Bill Gates at computer shows…"). For each chapter, give us <em>one specific moment</em> — the detail you\'d put in a one-line summary that makes someone go "oh wow." Doesn\'t have to be heroic. The better ones usually aren\'t.</div>'
        + '<div class="question">'
        + '  <div class="q-label">One moment per chapter.</div>'
        + '  <div class="q-hint">'
        + '    <strong>eCourier (2003–2011)</strong> — founding moment, 2008 near-catastrophe, exit, or one customer story. What\'s the line?<br><br>'
        + '    <strong>Hailo (2010–2014)</strong> — you co-founded with three London black cab drivers. What\'s the scene? Or a moment from raising USV / Accel / Branson money. Or the exit.<br><br>'
        + '    <strong>Thimble (2014–2025)</strong> — a specific freelancer story, the Arch acquisition moment, or something from the two years you stayed on as President.<br><br>'
        + '    <strong>Anything earlier (optional)</strong> — Dartmouth, the Harvard Law internship that talked you out of being a lawyer, growing up around medicine. A first-business or first-money-earned moment if you have one.'
        + '  </div>'
        + '  <textarea class="x-tall" data-key="q10" placeholder="eCourier (2003–2011) —\nHailo (2010–2014) —\nThimble (2014–2025) —\nEarlier (optional) —"></textarea>'
        + '</div>';
    }},

    // Submit
    { id: 'submit', label: 'Submit', type: 'submit', render: function () {
      return ''
        + '<div class="section-label">Final step</div>'
        + '<div class="section-title">Thanks for the time, Jay.</div>'
        + '<div class="section-desc">That\'s everything we needed. Hit submit and your content team will pick it up from here. First drafts in your inbox within the week.</div>';
    }},

    // Confirmation
    { id: 'done', label: 'Done', type: 'done', render: function () {
      return ''
        + '<div class="done">'
        + '  <div class="logo-brand" aria-label="Andel"><img src="assets/andel-icon.png" alt="Andel"></div>'
        + '  <h2>All set.</h2>'
        + '  <p>Your answers landed. Your content team will follow up with first drafts soon.</p>'
        + '</div>';
    }}
  ];

  // ============================================================
  // Renderer
  // ============================================================
  var current = 0;
  var answers = {};
  var startedSent = false;

  function render() {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="section active">' + sections[current].render() + '</div>';

    // Restore prior answers
    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (answers[k] === undefined) return;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        el.value = answers[k];
      } else if (el.classList.contains('radio-group')) {
        var radios = el.querySelectorAll('input[type="radio"]');
        radios.forEach(function (r) {
          if (r.value === answers[k]) {
            r.checked = true;
            r.closest('.radio-row').classList.add('selected');
          }
        });
      }
    });

    // Wire radios + reveal (supports multiple reveal blocks per group)
    app.querySelectorAll('.radio-group').forEach(function (group) {
      var radios = group.querySelectorAll('input[type="radio"]');
      var reveals = group.parentElement.querySelectorAll('[data-reveal-for]');
      radios.forEach(function (r) {
        r.addEventListener('change', function () {
          group.querySelectorAll('.radio-row').forEach(function (row) { row.classList.remove('selected'); });
          r.closest('.radio-row').classList.add('selected');
          reveals.forEach(function (revealHost) {
            var trigger = revealHost.dataset.revealFor;
            if (r.value === trigger) revealHost.classList.add('show');
            else revealHost.classList.remove('show');
          });
          saveAll();
        });
      });
      var checked = group.querySelector('input[type="radio"]:checked');
      if (checked) {
        reveals.forEach(function (revealHost) {
          if (checked.value === revealHost.dataset.revealFor) revealHost.classList.add('show');
        });
      }
    });

    // Wire inputs
    app.querySelectorAll('textarea, input[type="text"], input[type="email"]').forEach(function (el) {
      el.addEventListener('input', saveAll);
    });

    updateUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function saveAll() {
    var app = document.getElementById('app');
    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        answers[k] = el.value;
      } else if (el.classList.contains('radio-group')) {
        var checked = el.querySelector('input[type="radio"]:checked');
        answers[k] = checked ? checked.value : '';
      }
    });
  }

  function updateUI() {
    var totalSteps = sections.length - 2;
    var pct;
    if (current === 0) pct = 0;
    else if (current >= sections.length - 1) pct = 100;
    else pct = Math.round((current / totalSteps) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('sectionLabel').textContent = sections[current].label;

    var back = document.getElementById('btnBack');
    var next = document.getElementById('btnNext');
    var navBar = document.querySelector('.nav-bar');

    next.style.display = '';
    back.style.display = '';
    navBar.style.display = '';

    back.style.visibility = current === 0 ? 'hidden' : 'visible';

    var s = sections[current];
    if (s.type === 'welcome') {
      next.textContent = 'Get Started';
      next.className = 'btn btn-primary';
    } else if (s.type === 'submit') {
      next.textContent = 'Submit';
      next.className = 'btn btn-submit';
    } else if (s.type === 'done') {
      navBar.style.display = 'none';
    } else {
      next.textContent = 'Continue';
      next.className = 'btn btn-primary';
    }
  }

  function goNext() {
    saveAll();
    var s = sections[current];

    if (s.type === 'welcome') {
      if (!startedSent) {
        sendEvent('Started', {});
        startedSent = true;
      }
    } else if (s.type === 'question') {
      var payload = {};
      payload[s.qKey] = answers[s.qKey] || '';
      var otherKey = s.qKey + '_other';
      if (answers[otherKey]) payload[otherKey] = answers[otherKey];
      sendEvent('Q' + s.qNum + ' answered', payload);
    } else if (s.type === 'submit') {
      sendEvent('Submitted', {});
    }

    if (current < sections.length - 1) {
      current++;
      render();
    }
  }

  function goBack() {
    saveAll();
    if (current > 0) { current--; render(); }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.metaKey) goNext();
  });

  render();
</script>
</body>
</html>
